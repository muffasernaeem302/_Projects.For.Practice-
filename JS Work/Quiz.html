<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Demo 3: Promises Trivia Quiz</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #eef2f3; }
        .quiz-card { background: white; padding: 2rem; border-radius: 8px; max-width: 500px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .btn { display: inline-block; padding: 10px 20px; background: #007BFF; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 15px; }
        .result { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="quiz-card">
        <h2>Async Trivia App</h2>
        <p id="loading-text">Click the button below to fetch a question via Promise simulation.</p>
        <h3 id="question-text"></h3>
        <div id="options-container"></div>
        <button id="fetch-btn" class="btn">Fetch New Question</button>
        <p id="feedback" class="result"></p>
    </div>
    <script src="quiz.js"></script>
</body>
</html>
